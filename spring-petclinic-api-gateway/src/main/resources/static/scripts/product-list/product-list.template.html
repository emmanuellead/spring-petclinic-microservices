<h2>Products</h2>
<div class="row" style="margin-bottom: 20px;">
    <div class="col-sm-12">
        <a class="btn btn-default" ui-sref="productNew">Add Product</a>
    </div>
</div>
<table class="table table-striped">
    <thead>
    <tr>
        <th>Name</th>
        <th>Description</th>
        <th>Price</th>
        <th>Stock Quantity</th>
        <th>Action</th>
    </tr>
    </thead>

    <tr ng-repeat="product in $ctrl.productList">
        <td>{{product.name}}</td>
        <td>{{product.description}}</td>
        <td>{{product.price | currency}}</td>
        <td>{{product.stockQuantity}}</td>
        <td><a ui-sref="productEdit({productId: product.id})">Edit</a></td>
    </tr>
</table>
