<h2>Product</h2>
<form ng-submit="$ctrl.submitProductForm()" style="max-width: 25em;">
    <div class="form-group">
        <label>Name</label>
        <input class="form-control" ng-model="$ctrl.product.name" name="name" required/>
    </div>

    <div class="form-group">
        <label>Description</label>
        <textarea class="form-control" ng-model="$ctrl.product.description" name="description"></textarea>
    </div>

    <div class="form-group">
        <label>Price</label>
        <input type="number" step="0.01" class="form-control" ng-model="$ctrl.product.price" name="price" required/>
    </div>

    <div class="form-group">
        <label>Stock Quantity</label>
        <input type="number" class="form-control" ng-model="$ctrl.product.stockQuantity" name="stockQuantity" required/>
    </div>

    <div class="form-group">
        <button class="btn btn-primary" type="submit">Submit</button>
        <a class="btn btn-default" ui-sref="products">Cancel</a>
    </div>
</form>
